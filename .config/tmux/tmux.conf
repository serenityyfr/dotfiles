set -g mouse on
set -g set-clipboard on
set-option -g allow-rename off
set -g history-limit 10000


set -g pane-border-style 'fg=#1a1825'
set -g pane-active-border-style 'fg=#ebbcba'

# [ KEYBINDS ]
unbind C-b
set -g prefix C-s

unbind-key r
bind-key r source-file ~/.config/tmux/tmux.conf

set-window-option -g mode-keys vi
bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

bind-key p display-popup -E btop

bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

unbind %
unbind '"'
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

set -g status-position bottom
set -g status-bg "#26233a"
set -g status-fg "#6e6a86"
set status-justify "centre"
set-window-option -g window-status-current-style "fg=#ebbcba"
setw -g window-status-separator " "

set -g focus-events on
set -sg escape-time 0

set -g status-left "#S"
set -g status-left-style "fg=#ebbcba"

setw -g window-status-format "#I"
setw -g window-status-current-format "#I #W"

set -g status-right ""
