format = """
$git_branch\
$git_status\
$directory\
"""

# Disable the blank line at the start of the prompt
add_newline = false

[directory]
format = "[  $path ]($style)"
truncation_length = 2
truncation_symbol = ""

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
format = '[ $symbol $branch ]($style)'

[git_status]
format = '[$all_status$ahead_behind ]($style)'
